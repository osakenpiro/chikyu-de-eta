<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>地球でえた — データで見る地球儀</title>
<meta name="description" content="線だけで描かれた、裏側が透ける地球儀。日本の素材・資源を座標で見る。#全人類UX改善" />
<meta name="theme-color" content="#06070b" />
<meta property="og:type" content="website" />
<meta property="og:title" content="地球でえた — データで見る地球儀" />
<meta property="og:description" content="線だけで描かれた、裏側が透ける地球儀。日本の素材・資源を座標で見る。" />
<meta property="og:url" content="https://osakenpiro.github.io/chikyu-de-eta/" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="地球でえた — データで見る地球儀" />
<meta name="twitter:description" content="線だけで描かれた、裏側が透ける地球儀。日本の素材・資源を座標で見る。" />
<style>
  :root{
    --void:#06070b; --void2:#0a0c12;
    --gold:#d4a853; --gold-dim:#7a6433;
    --ink:#e8e6df; --mute:#8a8f99; --line:#1c2030;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--void);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;overflow:hidden;overscroll-behavior:none;}
  #globe{position:fixed;inset:0;touch-action:none;}
  canvas{display:block}

  #brand{position:fixed;top:14px;left:16px;z-index:5;pointer-events:none;user-select:none}
  #brand .t{font-size:15px;letter-spacing:.18em;color:var(--gold);font-weight:600}
  #brand .s{font-size:10.5px;letter-spacing:.06em;color:var(--mute);margin-top:3px}

  #panel{position:fixed;top:12px;right:12px;z-index:6;width:252px;max-width:calc(100vw - 24px);
    background:rgba(10,12,18,.82);backdrop-filter:blur(8px);border:1px solid var(--line);
    border-radius:12px;padding:12px 13px 13px;font-size:12px;color:var(--ink);
    box-shadow:0 8px 30px rgba(0,0,0,.5);max-height:calc(100vh - 24px);overflow:auto}
  #panel.collapsed .body{display:none}
  #panel h2{margin:0;font-size:11px;letter-spacing:.14em;color:var(--gold);
    display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-weight:600}
  #panel h2 .chev{color:var(--mute);font-size:13px;transition:transform .2s}
  #panel.collapsed h2 .chev{transform:rotate(-90deg)}
  .row{margin-top:11px}
  .row label{display:flex;justify-content:space-between;color:var(--mute);font-size:11px;margin-bottom:5px}
  .row label b{color:var(--ink);font-weight:500;font-variant-numeric:tabular-nums}
  input[type=range]{width:100%;-webkit-appearance:none;height:3px;border-radius:3px;
    background:linear-gradient(90deg,var(--gold-dim),var(--gold));outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;
    background:var(--gold);border:2px solid #1a1408;cursor:pointer}
  input[type=range]::-moz-range-thumb{width:13px;height:13px;border-radius:50%;background:var(--gold);border:2px solid #1a1408;cursor:pointer}
  .toggles{display:flex;gap:7px;margin-top:12px;flex-wrap:wrap}
  .toggles button{flex:1;min-width:64px;background:transparent;color:var(--mute);border:1px solid var(--line);
    border-radius:8px;padding:7px 4px;font-size:11px;cursor:pointer;transition:.15s}
  .toggles button.on{color:#1a1408;background:var(--gold);border-color:var(--gold);font-weight:600}
  .toggles button:active{transform:scale(.97)}

  .lgroup{margin-top:14px;border-top:1px solid var(--line);padding-top:11px}
  .lhead{font-size:10px;letter-spacing:.14em;color:var(--gold-dim);margin-bottom:8px;text-transform:uppercase}
  .lrow{display:flex;align-items:center;gap:8px;padding:5px 0;cursor:pointer}
  .lrow .sw{width:30px;height:17px;border-radius:9px;background:#20242f;border:1px solid var(--line);
    position:relative;flex:0 0 auto;transition:.15s}
  .lrow .sw::after{content:"";position:absolute;top:1.5px;left:1.5px;width:12px;height:12px;border-radius:50%;
    background:var(--mute);transition:.15s}
  .lrow.on .sw{background:var(--gold-dim);border-color:var(--gold)}
  .lrow.on .sw::after{left:14px;background:var(--gold)}
  .lrow .nm{font-size:11.5px;color:var(--mute)}
  .lrow.on .nm{color:var(--ink)}
  .lrow .dot{width:7px;height:7px;border-radius:50%;flex:0 0 auto;box-shadow:0 0 6px currentColor}

  #aboutBtn{position:fixed;left:16px;bottom:16px;z-index:6;background:rgba(10,12,18,.82);
    border:1px solid var(--line);color:var(--mute);border-radius:20px;padding:7px 14px;font-size:11px;
    cursor:pointer;letter-spacing:.06em}
  #about{position:fixed;inset:0;z-index:20;background:rgba(4,5,8,.92);backdrop-filter:blur(4px);
    display:none;align-items:center;justify-content:center;padding:24px}
  #about.show{display:flex}
  #about .card{max-width:520px;background:var(--void2);border:1px solid var(--line);border-radius:16px;
    padding:26px 26px 22px;line-height:1.85;font-size:13.5px;position:relative}
  #about h3{margin:0 0 12px;color:var(--gold);font-size:16px;letter-spacing:.08em}
  #about p{margin:0 0 14px;color:var(--ink)}
  #about .credits{font-size:11px;color:var(--mute);line-height:1.7;border-top:1px solid var(--line);padding-top:14px}
  #about .credits a{color:var(--gold-dim)}
  #about .x{position:absolute;top:18px;right:22px;color:var(--mute);font-size:24px;cursor:pointer;line-height:1}

  #foot{position:fixed;right:14px;bottom:12px;z-index:4;font-size:10px;color:var(--mute);
    text-align:right;line-height:1.5;pointer-events:none;max-width:46vw}
  #foot b{color:var(--gold-dim);font-weight:500}

  #status{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:10;
    color:var(--mute);font-size:12px;letter-spacing:.1em;text-align:center}
  #status .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--gold);
    margin-right:8px;animation:pulse 1.2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}

  @media (max-width:560px){
    #panel{width:212px;font-size:11.5px}
    #brand .t{font-size:13px}
    #foot{max-width:54vw}
  }
</style>
</head>
<body>
<div id="globe"></div>

<div id="brand">
  <div class="t">地球でえた</div>
  <div class="s">線だけの地球儀 · 日本の素材を座標で見る</div>
</div>

<div id="panel">
  <h2 id="panelHead">表示パラメータ <span class="chev">▾</span></h2>
  <div class="body">
    <div class="row">
      <label>線の不透明度 <b id="vOpacity">0.55</b></label>
      <input id="opacity" type="range" min="0.05" max="1" step="0.01" value="0.55" />
    </div>
    <div class="row">
      <label>裏側のフェード <b id="vFade">0.22</b></label>
      <input id="fade" type="range" min="0" max="0.7" step="0.01" value="0.22" />
    </div>
    <div class="row">
      <label>経緯線の密度 <b id="vGrid">15°</b></label>
      <input id="grid" type="range" min="5" max="30" step="5" value="15" />
    </div>
    <div class="toggles">
      <button id="tColor" data-on="0">白に切替</button>
      <button id="tRotate" class="on" data-on="1">自動回転</button>
    </div>
    <div class="lgroup">
      <div class="lhead">レイヤー</div>
      <div id="layerList"></div>
    </div>
  </div>
</div>

<button id="aboutBtn">これは何？</button>

<div id="foot"></div>

<div id="about">
  <div class="card">
    <span class="x" id="aboutX">×</span>
    <h3>地球でえた</h3>
    <p>線だけで描かれた、裏側が透ける地球儀。「データで見る地球」。<br/>
       主題は<b style="color:var(--gold)">日本の素材・資源</b>。ポータルではなく、<b style="color:var(--gold)">座標を持つものだけ</b>を載せる。</p>
    <p style="color:var(--mute);font-size:12.5px">銀河儀（主観の星図）の双子＝この現実球。
       レイヤーは <code>data/layers.json</code> に1行足すだけで増える設計。</p>
    <div class="credits" id="aboutCredits"></div>
  </div>
</div>

<div id="status"><span class="dot"></span>地球を組み立てています…</div>

<script type="importmap">
{
  "imports": {
    "three": "./vendor/three.module.min.js",
    "three/addons/": "./vendor/addons/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const R = 100, LS_KEY = 'chikyu-de-eta-v0', BUILD='2026-06-22a';
const statusEl = document.getElementById('status');
const isMobile = matchMedia('(max-width:560px)').matches;
const $ = s=>document.querySelector(s);

const settings = Object.assign({
  opacity: isMobile?0.5:0.55, fade:0.22, grid:15, white:false, rotate:true, layers:{}
}, load());
function load(){ try{ return JSON.parse(localStorage.getItem(LS_KEY)||'{}'); }catch(e){ return {}; } }
function save(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(settings)); }catch(e){} }

function toXYZ(lat,lng,alt=0){
  const phi=(90-lat)*Math.PI/180, theta=(90-lng)*Math.PI/180, r=R*(1+alt);
  return [ r*Math.sin(phi)*Math.cos(theta), r*Math.cos(phi), r*Math.sin(phi)*Math.sin(theta) ];
}

const container = document.getElementById('globe');
let renderer;
try{ renderer = new THREE.WebGLRenderer({antialias:true, alpha:true, powerPreference:'high-performance'}); }
catch(e){ statusEl.innerHTML='⚠ WebGL を初期化できませんでした。'; throw e; }
renderer.setPixelRatio(Math.min(devicePixelRatio||1,2));
renderer.setSize(innerWidth, innerHeight);
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 1, 4000);
const cs = toXYZ(36,138,1.35); camera.position.set(cs[0],cs[1],cs[2]);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping=true; controls.dampingFactor=0.08; controls.rotateSpeed=0.55; controls.zoomSpeed=0.8;
controls.minDistance=R*1.25; controls.maxDistance=R*4.2; controls.autoRotate=settings.rotate; controls.autoRotateSpeed=0.28;
controls.target.set(0,0,0);

(function stars(){
  const N=isMobile?900:1600, pos=new Float32Array(N*3);
  for(let i=0;i<N;i++){ const r=900+Math.random()*900,u=Math.random()*2-1,t=Math.random()*Math.PI*2,s=Math.sqrt(1-u*u);
    pos[i*3]=r*s*Math.cos(t); pos[i*3+1]=r*u; pos[i*3+2]=r*s*Math.sin(t); }
  const g=new THREE.BufferGeometry(); g.setAttribute('position', new THREE.BufferAttribute(pos,3));
  scene.add(new THREE.Points(g, new THREE.PointsMaterial({color:0x55607a,size:1.4,sizeAttenuation:false,transparent:true,opacity:0.55})));
})();

const WHITE = new THREE.Color('#e8e6df');
const FADE_VS = `varying vec3 vWorld; varying vec3 vNormal;
  void main(){ vWorld=position; vNormal=normalize(position);
    gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`;

// ---- shared depth-fade line material ----
function makeLineMat(color, opMul){
  const m = new THREE.ShaderMaterial({
    uniforms:{ uColor:{value:new THREE.Color(color)}, uOpacity:{value:settings.opacity*opMul},
      uBackFade:{value:settings.fade}, uCamPos:{value:new THREE.Vector3()} },
    vertexShader:FADE_VS,
    fragmentShader:`uniform vec3 uColor; uniform float uOpacity; uniform float uBackFade; uniform vec3 uCamPos;
      varying vec3 vWorld; varying vec3 vNormal;
      void main(){ vec3 vd=normalize(uCamPos-vWorld); float facing=dot(normalize(vNormal),vd);
        float f=smoothstep(-1.0,1.0,facing); float a=uOpacity*mix(uBackFade,1.0,f);
        gl_FragColor=vec4(uColor*(0.55+0.85*f), a); }`,
    transparent:true, blending:THREE.AdditiveBlending, depthWrite:false, depthTest:false
  });
  m.userData.opMul=opMul; m.userData.base=new THREE.Color(color);
  return m;
}
// ---- shared depth-fade point material (glowing dots) ----
function makePointMat(color, opMul, size){
  const m = new THREE.ShaderMaterial({
    uniforms:{ uColor:{value:new THREE.Color(color)}, uOpacity:{value:Math.min(1,settings.opacity*opMul)},
      uBackFade:{value:settings.fade}, uCamPos:{value:new THREE.Vector3()}, uSize:{value:size} },
    vertexShader:`attribute float aSize; varying vec3 vWorld; varying vec3 vNormal; uniform float uSize;
      void main(){ vWorld=position; vNormal=normalize(position);
        vec4 mv=modelViewMatrix*vec4(position,1.0);
        gl_PointSize=uSize*aSize*(300.0/-mv.z); gl_Position=projectionMatrix*mv; }`,
    fragmentShader:`uniform vec3 uColor; uniform float uOpacity; uniform float uBackFade; uniform vec3 uCamPos;
      varying vec3 vWorld; varying vec3 vNormal;
      void main(){ vec2 c=gl_PointCoord-vec2(0.5); float d=length(c); if(d>0.5) discard;
        float glow=smoothstep(0.5,0.0,d);
        vec3 vd=normalize(uCamPos-vWorld); float facing=dot(normalize(vNormal),vd);
        float f=smoothstep(-1.0,1.0,facing); float a=uOpacity*mix(uBackFade,1.0,f)*glow;
        gl_FragColor=vec4(uColor*(0.6+0.8*f), a); }`,
    transparent:true, blending:THREE.AdditiveBlending, depthWrite:false, depthTest:false
  });
  m.userData.opMul=opMul; m.userData.base=new THREE.Color(color);
  return m;
}

const allMats=[];   // every fade material (graticule + layers) for global control
const reg={};       // layer id -> {cfg,obj,mat}

// ---- graticule ----
const gratMat = makeLineMat('#d4a853', 1.0); allMats.push(gratMat);
let gratObj=null;
function buildGraticule(step){
  if(gratObj){ scene.remove(gratObj); gratObj.geometry.dispose(); }
  const seg=[], S=3;
  for(let lat=-80;lat<=80;lat+=step) for(let lng=-180;lng<180;lng+=S){ seg.push(toXYZ(lat,lng),toXYZ(lat,lng+S)); }
  for(let lng=-180;lng<180;lng+=step) for(let lat=-86;lat<86;lat+=S){ seg.push(toXYZ(lat,lng),toXYZ(lat+S,lng)); }
  const arr=new Float32Array(seg.length*3); seg.forEach((p,i)=>{arr[i*3]=p[0];arr[i*3+1]=p[1];arr[i*3+2]=p[2];});
  const g=new THREE.BufferGeometry(); g.setAttribute('position',new THREE.BufferAttribute(arr,3));
  gratObj=new THREE.LineSegments(g, gratMat); gratObj.renderOrder=1; scene.add(gratObj);
}
buildGraticule(settings.grid);

// ---- layer builders ----
function buildLineLayer(gj, cfg, mat){
  const seg=[], alt=cfg.altitude!=null?cfg.altitude:0.004;
  const ring=r=>{ for(let i=0;i<r.length-1;i++) seg.push(toXYZ(r[i][1],r[i][0],alt), toXYZ(r[i+1][1],r[i+1][0],alt)); };
  for(const f of gj.features){ const g=f.geometry; if(!g) continue;
    if(g.type==='Polygon') g.coordinates.forEach(ring);
    else if(g.type==='MultiPolygon') g.coordinates.forEach(p=>p.forEach(ring));
    else if(g.type==='LineString') ring(g.coordinates);
    else if(g.type==='MultiLineString') g.coordinates.forEach(ring);
  }
  const arr=new Float32Array(seg.length*3); seg.forEach((p,i)=>{arr[i*3]=p[0];arr[i*3+1]=p[1];arr[i*3+2]=p[2];});
  const geo=new THREE.BufferGeometry(); geo.setAttribute('position',new THREE.BufferAttribute(arr,3));
  const o=new THREE.LineSegments(geo,mat); o.renderOrder=2; return {obj:o, count:seg.length/2};
}
function buildPointLayer(gj, cfg, mat){
  const pos=[], sizes=[], alt=cfg.altitude!=null?cfg.altitude:0.012,
        sf=cfg.sizeField, sc=cfg.sizeScale!=null?cfg.sizeScale:1, sb=cfg.sizeBase!=null?cfg.sizeBase:1;
  const add=(lng,lat,props)=>{ const p=toXYZ(lat,lng,alt); pos.push(p[0],p[1],p[2]);
    let s=sb; if(sf && props && props[sf]!=null) s=sb+(+props[sf])*sc; sizes.push(s); };
  for(const f of gj.features){ const g=f.geometry; if(!g) continue; const pr=f.properties||{};
    if(g.type==='Point') add(g.coordinates[0],g.coordinates[1],pr);
    else if(g.type==='MultiPoint') g.coordinates.forEach(c=>add(c[0],c[1],pr));
  }
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(pos),3));
  geo.setAttribute('aSize',new THREE.BufferAttribute(new Float32Array(sizes),1));
  const o=new THREE.Points(geo,mat); o.renderOrder=3; return {obj:o, count:pos.length/3};
}

// ---- UI builders ----
function layerUI(){
  const box=$('#layerList'); box.innerHTML='';
  Object.values(reg).forEach(({cfg,obj})=>{
    const on=!!settings.layers[cfg.id];
    const row=document.createElement('div'); row.className='lrow'+(on?' on':'');
    row.innerHTML=`<span class="dot" style="color:${cfg.color}"></span><span class="sw"></span><span class="nm">${cfg.name}</span>`;
    row.addEventListener('click',()=>{ const v=!settings.layers[cfg.id]; settings.layers[cfg.id]=v;
      obj.visible=v; row.classList.toggle('on',v); save(); });
    box.appendChild(row);
  });
}
function credits(){
  const cs=[]; Object.values(reg).forEach(({cfg})=>{ if(cfg.credit && !cs.includes(cfg.credit)) cs.push(cfg.credit); });
  $('#foot').innerHTML = '<div><b>出典</b></div>'+cs.map(c=>`<div>${c}</div>`).join('');
  $('#aboutCredits').innerHTML = cs.map(c=>`<div>${c}</div>`).join('') +
    '<div style="margin-top:8px">描画：Three.js（同梱・MIT）／コード：MIT・データ：各CC BY 4.0</div>'+
    '<div style="margin-top:6px;color:var(--gold-dim)">#全人類UX改善 · osakenpiro</div>';
}

function applyColor(){ const w=settings.white;
  allMats.forEach(m=> m.uniforms.uColor.value.copy(w?WHITE:m.userData.base));
  $('#tColor').textContent = w?'金に切替':'白に切替';
}
function applyOpacity(){ allMats.forEach(m=> m.uniforms.uOpacity.value = Math.min(1, settings.opacity*m.userData.opMul)); }
function applyFade(){ allMats.forEach(m=> m.uniforms.uBackFade.value = settings.fade); }

function labels(){ $('#vOpacity').textContent=settings.opacity.toFixed(2);
  $('#vFade').textContent=settings.fade.toFixed(2); $('#vGrid').textContent=settings.grid+'°'; }

$('#opacity').value=settings.opacity; $('#fade').value=settings.fade; $('#grid').value=settings.grid; labels();
$('#opacity').addEventListener('input',e=>{ settings.opacity=+e.target.value; applyOpacity(); labels(); save(); });
$('#fade').addEventListener('input',e=>{ settings.fade=+e.target.value; applyFade(); labels(); save(); });
$('#grid').addEventListener('input',e=>{ settings.grid=+e.target.value; labels(); });
$('#grid').addEventListener('change',()=>{ buildGraticule(settings.grid); save(); });
$('#tColor').addEventListener('click',()=>{ settings.white=!settings.white; applyColor(); save(); });
const rotBtn=$('#tRotate'); rotBtn.classList.toggle('on',settings.rotate);
rotBtn.addEventListener('click',()=>{ settings.rotate=!settings.rotate; controls.autoRotate=settings.rotate; rotBtn.classList.toggle('on',settings.rotate); save(); });
$('#panelHead').addEventListener('click',()=>$('#panel').classList.toggle('collapsed'));
$('#aboutBtn').addEventListener('click',()=>$('#about').classList.add('show'));
$('#aboutX').addEventListener('click',()=>$('#about').classList.remove('show'));
$('#about').addEventListener('click',e=>{ if(e.target.id==='about') $('#about').classList.remove('show'); });
applyColor();

addEventListener('resize',()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); },{passive:true});

function tick(){ controls.update();
  const cp=camera.position; allMats.forEach(m=> m.uniforms.uCamPos.value.copy(cp));
  renderer.render(scene,camera); requestAnimationFrame(tick); }
tick();

// ---- load manifest + layers ----
fetch('data/layers.json?b='+BUILD).then(r=>{ if(!r.ok) throw new Error('layers.json '+r.status); return r.json(); })
  .then(cfg=>{
    const layers=(cfg.layers||[]);
    return layers.reduce((chain,l)=> chain.then(()=>loadLayer(l)), Promise.resolve())
      .then(()=>{ layerUI(); credits(); statusEl.style.display='none';
        console.log('[chikyu-de-eta] ready:', Object.keys(reg).length, 'layers'); });
  })
  .catch(err=>{ console.error('[chikyu-de-eta] manifest failed', err);
    statusEl.innerHTML='経緯線は表示中。レイヤー定義の読込に失敗しました（'+err.message+'）。'; });

function loadLayer(l){
  if(settings.layers[l.id]===undefined) settings.layers[l.id] = l.enabled!==false;
  return fetch(l.file+(l.file.indexOf('?')<0?'?':'&')+'b='+BUILD).then(r=>{ if(!r.ok) throw new Error(l.id+' '+r.status); return r.json(); })
    .then(gj=>{
      const opMul=l.opacityMul!=null?l.opacityMul:1;
      let built, mat;
      if(l.kind==='point'){ mat=makePointMat(l.color, opMul, l.size!=null?l.size:2.4); built=buildPointLayer(gj,l,mat); }
      else { mat=makeLineMat(l.color, opMul); built=buildLineLayer(gj,l,mat); }
      allMats.push(mat);
      built.obj.visible = !!settings.layers[l.id];
      scene.add(built.obj);
      reg[l.id]={cfg:l, obj:built.obj, mat};
      if(settings.white) mat.uniforms.uColor.value.copy(WHITE);
      console.log('[chikyu-de-eta] layer', l.id, 'loaded:', built.count, l.kind==='point'?'points':'segments');
    })
    .catch(e=>{ console.error('[chikyu-de-eta] layer failed', l.id, e); });
}
